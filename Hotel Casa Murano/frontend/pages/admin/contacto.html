<style>
    [data-seccion="contacto"] .admin-form input[type="text"],
    [data-seccion="contacto"] .admin-form input[type="url"] {
        width: 100%;
        padding: 10px 14px;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(0,0,0,0.3);
        color: var(--text-white);
        font-family: var(--font-body);
        font-size: 0.95rem;
        transition: var(--transition);
    }
    [data-seccion="contacto"] .admin-form input:focus {
        outline: none;
        border-color: var(--primary);
    }
</style>

<div data-seccion="contacto">
    <h2>Contacto</h2>

    <div class="admin-form" id="form-contacto">
        <h3>Información de contacto</h3>

        <div class="admin-form-group">
            <label>Celular</label>
            <input type="text" id="contacto-celular" placeholder="+57 300 000 0000">
        </div>

        <div class="admin-form-group">
            <label>Email</label>
            <input type="text" id="contacto-email" placeholder="correo@ejemplo.com">
        </div>

        <div class="admin-form-group">
            <label>Dirección</label>
            <input type="text" id="contacto-direccion" placeholder="Calle 123 # 45-67, Ciudad">
        </div>

        <div class="admin-form-group">
            <label>Link de mapa Google</label>
            <input type="text" id="contacto-mapa" placeholder="https://www.google.com/maps/embed?pb=...">
        </div>

        <div class="admin-actions">
            <button class="btn-guardar" onclick="api_contacto.guardar()">Guardar</button>
        </div>
    </div>
</div>
