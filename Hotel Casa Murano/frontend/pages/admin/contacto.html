<link rel="stylesheet" href="/frontend/css/pages/admin-contacto.css">
<section id="contacto" class="seccion-admin active">
    <h1>Administrar Contacto</h1>
    <p class="descripcion-seccion">Modifica la información de contacto y revisa los mensajes recibidos.</p>

    <div class="admin-form" id="form-info-contacto">
        <h2>Información de Contacto</h2>
        <div class="admin-form-group">
            <label>Dirección</label>
            <input type="text" id="contacto-direccion" placeholder="Dirección del hotel">
        </div>
        <div class="admin-form-group">
            <label>Celular / Teléfono</label>
            <input type="tel" id="contacto-celular" placeholder="+57 300 000 0000">
        </div>
        <div class="admin-form-group">
            <label>Email</label>
            <input type="email" id="contacto-email" placeholder="correo@hotel.com">
        </div>
        <div class="admin-form-group">
            <label>Mapa (iframe)</label>
            <textarea id="contacto-mapa" placeholder="Código iframe de Google Maps"></textarea>
        </div>
        <div class="admin-actions">
            <button class="btn-guardar" onclick="guardarInfoContacto()">Guardar Información</button>
        </div>
    </div>

    <h2 style="font-family:var(--font-serif);font-size:1.4rem;color:#222;margin-top:30px">Mensajes Recibidos</h2>

    <div class="admin-table-wrap" style="margin-top:15px">
        <table class="admin-table" id="tabla-mensajes">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Asunto</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th class="th-acciones">Acciones</th>
                </tr>
            </thead>
            <tbody id="mensajes-body"><tr><td colspan="6" class="vacio">Sin mensajes</td></tr></tbody>
        </table>
    </div>
</section>
