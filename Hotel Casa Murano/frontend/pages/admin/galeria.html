<style>
    .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
    }
    .preview-item {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 16 / 9;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.08);
        max-width: 200px;
    }
    .preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .btn-remove-img {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(231, 76, 60, 0.9);
        color: white;
        border: none;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        line-height: 1;
    }
    .btn-remove-img:hover {
        background: #e74c3c;
        transform: scale(1.1);
    }
    .eliminar-lista {
        margin-top: 1.5rem;
        display: none;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
    }
    .eliminar-lista.mostrar {
        display: grid;
    }
    .eliminar-item {
        background: rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .eliminar-item img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 6px;
    }
    .btn-eliminar-item {
        background: rgba(231,76,60,0.9);
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.85rem;
        transition: var(--transition);
        white-space: nowrap;
        width: 100%;
    }
    .btn-eliminar-item:hover {
        background: #e74c3c;
    }
    .form-galeria {
        display: none;
    }
    .form-galeria.mostrar {
        display: block;
    }
</style>

<div data-seccion="galeria">
    <h2>Galería</h2>

    <div class="admin-actions" style="justify-content: flex-start;">
        <button class="btn-guardar" id="btn-anadir">Añadir</button>
        <button class="btn-eliminar" id="btn-eliminar">Eliminar</button>
    </div>

    <div class="admin-form form-galeria" id="form-galeria">
        <h3>Imagen</h3>

        <div class="admin-form-group">
            <label>Imagen</label>
            <div class="upload-area" id="galeria-upload-area">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <span>Haz clic para seleccionar una imagen</span>
                <input type="file" id="galeria-input" accept="image/*">
            </div>
        </div>
        <div class="preview-grid" id="galeria-preview"></div>

        <div class="admin-actions">
            <button class="btn-guardar" onclick="api_galeria.guardar()">Guardar</button>
        </div>
    </div>

    <div class="eliminar-lista" id="eliminar-lista"></div>
</div>
