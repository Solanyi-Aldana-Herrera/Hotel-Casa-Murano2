<link rel="stylesheet" href="/frontend/css/pages/admin-inicio.css">

<style>
    [data-seccion="inicio"] .btn-guardar {
        padding: 12px 32px;
        background: var(--primary);
        color: var(--bg-dark);
        border: none;
        border-radius: 6px;
        font-family: var(--font-heading);
        font-size: 1.05rem;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 700;
    }
    [data-seccion="inicio"] .btn-guardar:hover {
        background: var(--primary-light);
        transform: translateY(-1px);
    }
</style>

<div data-seccion="inicio">
    <h2>Inicio</h2>

    <div class="admin-form" id="form-sliders">
        <h3>Contenido Principal (Slider)</h3>
        <p style="color:var(--text-muted);font-family:var(--font-body);margin-bottom:1rem;font-size:0.9rem;">
            Máximo 5 imágenes. La primera será la imagen principal.
        </p>
        <div class="admin-form-group">
            <label>Imágenes del Slider</label>
            <label class="upload-area" id="sliders-upload-area" for="sliders-input">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <span>Haz clic para seleccionar imágenes (máx 5)</span>
            </label>
            <input type="file" id="sliders-input" accept="image/*" multiple style="display:none">
        </div>
        <div class="sliders-preview-grid" id="sliders-preview"></div>

        <div class="admin-actions">
            <button class="btn-guardar" onclick="api_inicio.guardarTodo()">Guardar</button>
        </div>
    </div>
</div>
