<link rel="stylesheet" href="/frontend/css/pages/admin-inicio.css">
<section id="inicio" class="seccion-admin active">
    <h1>Administrar Inicio</h1>
    <p class="descripcion-seccion">Gestiona el texto de bienvenida, la imagen lateral y el carrusel de fotos del slider.</p>

    <div class="admin-form" id="form-bienvenida">
        <h2>Contenido de Bienvenida</h2>

        <div class="admin-form-group">
            <label>Título</label>
            <input type="text" id="bienvenida-titulo" placeholder="Título principal (ej: Bienvenidos)">
        </div>

        <div class="admin-form-group">
            <label>Subtítulo</label>
            <input type="text" id="bienvenida-subtitulo" placeholder="Subtítulo (ej: Hotel Casa Murano)">
        </div>

        <div class="admin-form-group">
            <label>Descripción</label>
            <textarea id="bienvenida-descripcion" placeholder="Descripción de bienvenida" rows="4"></textarea>
        </div>

        <div class="admin-form-group">
            <label>Despedida</label>
            <input type="text" id="bienvenida-despedida" placeholder="Frase de despedida (ej: La Gerencia de Hotel Casa Murano)">
        </div>

        <div class="admin-form-group">
            <label>Imagen Bienvenida</label>
            <div class="upload-area" onclick="document.getElementById('bienvenida-img-input').click()">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <p>Haz clic para seleccionar imagen</p>
                <span class="sub-texto">JPG, JPEG, PNG, WEBP</span>
            </div>
            <input type="file" id="bienvenida-img-input" accept="image/*" style="display:none">
            <div class="upload-preview" id="bienvenida-img-preview" style="display:none">
                <img src="" alt="preview">
                <div class="info"><p id="bienvenida-img-nombre"></p></div>
                <button type="button" class="btn-remove-img" onclick="removerBienvenidaImg()" title="Quitar imagen">&times;</button>
            </div>
            <input type="hidden" id="bienvenida-imagen">
        </div>


        <div class="admin-actions">
            <button class="btn-guardar" onclick="guardarBienvenida()">Guardar</button>
        </div>
    </div>
</section>
