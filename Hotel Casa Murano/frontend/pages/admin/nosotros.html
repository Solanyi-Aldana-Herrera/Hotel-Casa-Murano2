<style>
    [data-seccion="nosotros"] .admin-form textarea {
        width: 100%;
        padding: 10px 14px;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(0,0,0,0.3);
        color: var(--text-white);
        font-family: var(--font-body);
        font-size: 0.95rem;
        resize: vertical;
        min-height: 100px;
        transition: var(--transition);
    }
    [data-seccion="nosotros"] .admin-form textarea:focus {
        outline: none;
        border-color: var(--primary);
    }
    .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
    }
    .preview-item {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 16 / 9;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.08);
        max-width: 200px;
    }
    .preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>

<div data-seccion="nosotros">
    <h2>Nosotros</h2>

    <div class="admin-form" id="form-mision">
        <h3>Misión</h3>
        <div class="admin-form-group">
            <label>Descripción</label>
            <textarea id="mision-descripcion" placeholder="Ingrese la descripción de la misión"></textarea>
        </div>
        <div class="admin-form-group">
            <label>Imagen</label>
            <div class="upload-area" id="mision-upload-area">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <span>Haz clic para seleccionar una imagen</span>
                <input type="file" id="mision-input" accept="image/*">
            </div>
        </div>
        <div class="preview-grid" id="mision-preview"></div>
    </div>

    <div class="admin-form" id="form-vision">
        <h3>Visión</h3>
        <div class="admin-form-group">
            <label>Descripción</label>
            <textarea id="vision-descripcion" placeholder="Ingrese la descripción de la visión"></textarea>
        </div>
        <div class="admin-form-group">
            <label>Imagen</label>
            <div class="upload-area" id="vision-upload-area">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <span>Haz clic para seleccionar una imagen</span>
                <input type="file" id="vision-input" accept="image/*">
            </div>
        </div>
        <div class="preview-grid" id="vision-preview"></div>
    </div>

    <div class="admin-form" id="form-valores">
        <h3>Valores</h3>
        <div class="admin-form-group">
            <label>Descripción</label>
            <textarea id="valores-descripcion" placeholder="Ingrese la descripción de los valores"></textarea>
        </div>
        <div class="admin-form-group">
            <label>Imagen</label>
            <div class="upload-area" id="valores-upload-area">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                <span>Haz clic para seleccionar una imagen</span>
                <input type="file" id="valores-input" accept="image/*">
            </div>
        </div>
        <div class="preview-grid" id="valores-preview"></div>

        <div class="admin-actions">
            <button class="btn-guardar" onclick="api_nosotros.guardarTodo()">Guardar</button>
        </div>
    </div>
</div>
